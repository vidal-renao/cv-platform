name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Audit frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          JWT_SECRET: test_jwt_secret_32_chars_minimum_value
          DATABASE_URL: postgres://user:pass@localhost:5432/cv_platform_test
          RESEND_API_KEY: re_test_key
      - name: DB integration tests
        if: ${{ secrets.TEST_DATABASE_URL != '' }}
        run: npm run test:db
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: re_test_key
      - name: Audit backend
        run: npm audit --audit-level=high
        continue-on-error: true
